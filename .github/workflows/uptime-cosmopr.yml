name: Uptime Monitor - COSMO PR
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check cosmopr.co.jp
        run: |
          URL="https://cosmopr.co.jp/ja/"
          for i in 1 2 3; do
            CODE=$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL")
            echo "Attempt $i: HTTP $CODE"
            if [ "$CODE" -ge 200 ] && [ "$CODE" -lt 400 ]; then
              echo "OK: $URL is up (HTTP $CODE)"
              exit 0
            fi
            sleep 15
          done
          echo "DOWN: $URL did not respond normally after 3 attempts"
          exit 1
